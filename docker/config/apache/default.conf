
<VirtualHost *:80>
    DocumentRoot /var/www/public
    
    # Définir correctement les types MIME pour les fichiers JavaScript
    <IfModule mod_mime.c>
        AddType application/javascript .js
    </IfModule>
    
    # Configuration du répertoire
    <Directory /var/www/public>
        AllowOverride All
        Require all granted
        Order Allow,Deny
        Allow from All
        
        # Configuration de Rewrite pour Symfony
        <IfModule mod_rewrite.c>
            RewriteEngine On
            RewriteCond %{REQUEST_FILENAME} !-f
            RewriteRule ^(.*)$ /index.php [QSA,L]
        </IfModule>
        
        # Forcer le type MIME correct pour les fichiers JavaScript
        <FilesMatch "\.js$">
            ForceType application/javascript
        </FilesMatch>
    </Directory>
    
    # Assurez-vous que les fichiers dans assets/ sont servis directement
    <Directory /var/www/public/assets>
        FallbackResource disabled
    </Directory>
</VirtualHost>