services:
  ###> doctrine/doctrine-bundle ###
  database:
    ports:
      - "5433:5432"
  ###< doctrine/doctrine-bundle ###

  adminer:
    image: adminer
    restart: always
    ports:
      - 8080:8080

  ###> symfony/mailer ###
  mailer:
    image: axllent/mailpit
    ports:
      - "1025:1025"
      - "8025:8025"
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
###< symfony/mailer ###
