name: Deploy
on:
  push:
    branches:
      - develop
jobs:
  build:
    name: Build and push docker image to registry
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Shallow clones should be disabled for a better relevancy of analysis
      - name: Login to GHCR 
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          push: true
          tags: |
            ghcr.io/ponche/hopper:dev-latest
            ghcr.io/ponche/hopper:dev-v${{ github.run_number }}

  update:
    name: Update the VPS with Ansible
    runs-on: ubuntu-latest
    needs: build
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Create inventory ansible
      run:  echo "${{ secrets.INVENTORY }}" > inventory.ini
    - name: download the collection community.docker on Galaxy
      run: ansible-galaxy collection install community.docker
    - name: Play Ansible Playbook
      uses: arillso/action.playbook@master
      with:
        playbook: ansible/updateSiteKapoot.yml
        private_key: ${{ secrets.VPS_KEY }}
        user: ${{ secrets.VPS_USER }}
        inventory: inventory.ini
      env:
        ANSIBLE_HOST_KEY_CHECKING: 'false'
        ANSIBLE_DEPRECATION_WARNINGS: 'false'