
services:
###> doctrine/doctrine-bundle ###
  database:
    image: postgres:${POSTGRES_VERSION:-16}-alpine
    env_file: ".env"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-app}
      # You should definitely change the password in production
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER:-app}
    healthcheck:
      test: ["CMD", "pg_isready", "-d", "${POSTGRES_DB:-app}", "-U", "${POSTGRES_USER:-app}"]
      timeout: 5s
      retries: 5
      start_period: 60s
    volumes:
      - database_data:/var/lib/postgresql/data:rw
      # You may use a bind-mounted host directory instead, so that it is harder to accidentally remove the volume and lose all your data!
      # - ./docker/db/data:/var/lib/postgresql/data:rw
###< doctrine/doctrine-bundle ###
  app: 
    image: ghcr.io/project-kapoot/hopper:dev-latest
    env_file: ".env"
    depends_on: 
      database: 
        condition: service_healthy
    command: sh -c "php bin/console do:mi:mi -n && exec apache2-foreground"  
    ports: 
      - "${APP_PORT:-8080}:80" # to defined in the .env by default is set to 8080 
    environment: 
      DATABASE_URL: "postgresql://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD}@database:5432/app?serverVersion=${POSTGRES_VERSION:-16}&charset=utf8"
      MESSENGER_TRANSPORT_DSN: ${MESSENGER_TRANSPORT_DSN:-doctrine://default?auto_setup=0}
      MAILER_DSN: ${MAILER_DSN:-null://null}
      APP_ENV: ${APP_ENV:-prod}
      APP_SECRET: ${APP_SECRET:-app_secret_do_not_injected_here_the_secret}

## value harcoded, to modified later

volumes:
###> doctrine/doctrine-bundle ###
  database_data:
###< doctrine/doctrine-bundle ###
